// CS2 Zombie Mod local server defaults.
// This file is copied to server/game/csgo/cfg/zombiemod_server.cfg by start-server.bat.

hostname "CS2 Zombie Mod Local"

// Keep CS2 from filling the server with default casual/deathmatch bots.
bot_quota 0
bot_quota_mode normal
bot_kick

// Zombie Mod owns the pacing.
mp_do_warmup_period 0
mp_warmuptime 0
mp_warmuptime_all_players_connected 0
mp_warmup_end
mp_freezetime 0
mp_round_restart_delay 0
mp_roundtime 5.25
mp_roundtime_defuse 5.25
mp_roundtime_hostage 5.25
mp_ignore_round_win_conditions 1
mp_timelimit 0
mp_buytime 0
mp_buy_anywhere 0

// Keep team systems from fighting infection teams.
mp_teammates_are_enemies 0
mp_friendlyfire 0
mp_autoteambalance 0
mp_limitteams 0
mp_solid_teammates 0
bot_stop 0
bot_dont_shoot 0

// Let the mod create spread-out starts instead of CT/T spawn clumps.
mp_randomspawn 1
mp_randomspawn_los 0

// Clean local testing defaults.
sv_lan 1
sv_cheats 0
